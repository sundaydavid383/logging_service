version: "3.9"

services:
  web:
    build: .
    container_name: fdq_web_app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # 1. Pulls all 40+ config variables from your .env automatically
    env_file:
      - .env
    # 2. Overrides the network hosts so they use container names instead of localhost
    environment:
      - ENVIRONMENT=production
      - SWAGGER_UI_ENABLED=false
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - .:/app

  postgres:
    image: postgres:16
    container_name: fdq_postgres
    restart: always
    environment:
      POSTGRES_USER: fdq_user
      POSTGRES_PASSWORD: fdq_password
      POSTGRES_DB: fdq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fdq_user -d fdq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7
    container_name: fdq_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: