# ===========================================================================
# Fiducia DQMS — Alembic Migration Configuration
# ===========================================================================

[alembic]
# Path to migration scripts
script_location = migrations

# Placeholder requirement. Overwritten at runtime by your Pydantic settings in env.py
sqlalchemy.url = postgresql://placeholder_user:placeholder_pass@localhost/placeholder_db

# Clean date/time prefix naming structure for sequential file tracking
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40

# Add local path to sys.path so env.py can cleanly import your application modules
prepend_sys_path = .

# String token used to separate version paths (space is standard and cross-platform)
version_path_separator = space

[post_write_hooks]
# Hook configurations go here if you use auto-formatters like black or ruff

# ===========================================================================
# Logging Infrastructure Configuration
# ===========================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S